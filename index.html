<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGuard | Simra's Quizzes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --accent: #6366f1;
            --correct: #2ecc71; --wrong: #e74c3c;
            --glass: rgba(15, 23, 42, 0.8);
            --dark-bg: #0f172a; --gh-border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-color: var(--dark-bg);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            color: white;
        }

        /* --- INTRO & NAV --- */
        #splash-screen { position: fixed; inset: 0; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: 1s ease-in-out; }
        .intro-title { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .fade-out { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        nav { position: fixed; top: 20px; width: 90%; max-width: 1000px; padding: 15px 25px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 500; }

        /* --- COOL CONTAINER --- */
        #game-container {
            background: var(--glass); width: 95%; max-width: 500px; padding: 2.5rem;
            border-radius: 30px; box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
        }

        /* --- PROGRESS BAR --- */
        .progress-container { margin-bottom: 20px; text-align: left; }
        .progress-text { font-size: 0.8rem; color: var(--primary); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .progress-bar-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: linear-gradient(to right, var(--primary), var(--accent)); width: 0%; height: 100%; transition: 0.4s ease; }

        h3 { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.4; }

        /* --- CREATIVE BUTTONS --- */
        .btn { background: linear-gradient(135deg, var(--accent), var(--secondary)); color: white; border: none; padding: 16px; border-radius: 16px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .option-btn { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 18px; border-radius: 15px; cursor: pointer; width: 100%; margin-top: 12px; 
            text-align: left; color: #cbd5e1; font-family: inherit; transition: 0.3s;
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--primary); color: white; transform: translateX(8px); }

        #feedback-overlay { position: absolute; inset: 0; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 30px; }
        .hidden { display: none !important; }
        .rank-item { display: flex; justify-content: space-between; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="intro-title">Simra's Quiz</h1>
        <p style="letter-spacing: 5px; color: #64748b;">ARENA 2.0</p>
    </div>

    <nav>
        <span style="font-weight: 800; color: var(--primary);">LIFEGUARD</span>
        <button class="btn" style="width: auto; padding: 8px 15px; margin:0;" onclick="location.reload()">Reset</button>
    </nav>

    <div id="game-container" class="hidden">
        
        <div id="start-screen">
            <h1 style="margin-bottom: 10px;">Welcome, Hero</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">Your strategy session begins now.</p>
            <input type="text" id="username" placeholder="Enter Your Name..." style="width: 100%; padding: 16px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--gh-border); color: white; outline: none; margin-bottom: 20px;">
            <button class="btn" onclick="startGame()">LAUNCH MISSION</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="progress-container">
                <span class="progress-text" id="q-counter">Question 1 of 10</span>
                <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            </div>
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
            
            <div id="feedback-overlay" class="hidden">
                <h1 id="feedback-icon" style="font-size: 5rem; margin-bottom: 10px;"></h1>
                <h2 id="feedback-title" style="margin-bottom: 20px;"></h2>
                <button class="btn" style="width: auto; padding: 12px 40px;" onclick="closeFeedback()">NEXT STEP</button>
            </div>
        </div>

        <div id="end-screen" class="hidden">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Mission Complete</h2>
            <div id="final-leaderboard"></div>
            <button class="btn" onclick="location.reload()">RETURN TO HUB</button>
        </div>
    </div>

    <script>
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbydWxniS6CoGqvMx20oiKOMCOW5pWzVmtbWwa71zX2nvkiXbEvfq8N0Ip1A3WaTs_IG/exec"; 

        const questions = [
            { q: "What is a 'Normal' Blood Pressure reading?", a: ["120/80 mmHg", "140/90 mmHg", "160/100 mmHg", "90/60 mmHg"], correct: 0 },
            { q: "Which habit is most damaging for CHD?", a: ["Walking", "Smoking", "Water", "Yoga"], correct: 1 },
            { q: "Obesity management focuses on...", a: ["Sleeping", "Physical activity", "Salt", "Skipping breakfast"], correct: 1 },
            { q: "HIV is NOT transmitted through...", a: ["Contact", "Needles", "Handshakes", "Transfusion"], correct: 2 },
            { q: "Limit what for Hypertension?", a: ["Salt", "Potassium", "Magnesium", "Calcium"], correct: 0 },
            { q: "BMI over 30 is?", a: ["Underweight", "Healthy", "Overweight", "Obese"], correct: 3 },
            { q: "PrEP prevents which condition?", a: ["Obesity", "HIV", "Cold", "High BP"], correct: 1 },
            { q: "CHD affects which part?", a: ["Arteries", "Lungs", "Brain", "Liver"], correct: 0 },
            { q: "Hypertension is the '____ Killer'.", a: ["Fast", "Silent", "Hidden", "Loud"], correct: 1 },
            { q: "Prevent lifestyle diseases via?", a: ["Genetics", "Healthy Choices", "Ignoring", "Sugar"], correct: 1 }
        ];

        let currentQ = 0; let score = 0; let playerName = "";

        window.onload = () => setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
            document.getElementById('game-container').classList.remove('hidden');
        }, 3000);

        function startGame() {
            playerName = document.getElementById('username').value.trim();
            if(!playerName) return alert("Identify yourself, Hero!");
            if(playerName.toLowerCase() === "admin123") { showLeaderboard(); return; }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            // Update Progress
            document.getElementById('q-counter').innerText = `Question ${currentQ + 1} of ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${((currentQ + 1) / questions.length) * 100}%`;
            
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => handleAnswer(idx);
                container.appendChild(b);
            });
        }

        function handleAnswer(idx) {
            const isCorrect = idx === questions[currentQ].correct;
            if (isCorrect) score += 10;
            const overlay = document.getElementById('feedback-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('feedback-icon').innerText = isCorrect ? "✨" : "⚠️";
            document.getElementById('feedback-title').innerText = isCorrect ? "Excellent!" : "Not quite...";
            document.getElementById('feedback-title').style.color = isCorrect ? "var(--correct)" : "var(--wrong)";
        }

        async function closeFeedback() {
            document.getElementById('feedback-overlay').classList.add('hidden');
            currentQ++;
            if(currentQ < questions.length) {
                showQuestion();
            } else {
                await saveScore();
                showLeaderboard();
            }
        }

        async function saveScore() {
            if (playerName.toLowerCase() === "admin123") return;
            try {
                await fetch(DATABASE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: playerName, score: score }) });
            } catch (e) { console.error("Sync Error", e); }
        }

        async function showLeaderboard() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            try {
                const response = await fetch(DATABASE_URL + "?t=" + new Date().getTime());
                const data = await response.json();
                data.sort((a, b) => b.score - a.score);
                document.getElementById('final-leaderboard').innerHTML = data.slice(0, 5).map((e, i) => `
                    <div class="rank-item"><span>#${i+1} ${e.name}</span><span>${e.score} pts</span></div>
                `).join('');
            } catch (e) {
                document.getElementById('final-leaderboard').innerHTML = "<p style='color:#64748b'>Establishing connection...</p>";
            }
        }
    </script>
</body>
</html>
