<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGuard | Simra's Quizzes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --accent: #6366f1;
            --correct: #2ecc71; --wrong: #e74c3c;
            --glass: rgba(15, 23, 42, 0.9);
            --dark-bg: #0f172a; --gh-dark: #161b22; --gh-border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-color: var(--dark-bg);
            min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden;
            color: white;
            padding-top: 100px; /* Crucial fix: prevents collision with nav bar */
        }

        /* --- RESTORED ANIMATED INTRO --- */
        #splash-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s;
        }

        .intro-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800;
            background: linear-gradient(to right, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite, float 4s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1rem; color: #94a3b8; letter-spacing: 4px; text-transform: uppercase;
            opacity: 0; animation: fadeInDelay 1.5s forwards 0.5s;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes fadeInDelay { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-out { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        /* --- STYLISH NAVBAR --- */
        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1000px; padding: 12px 25px; border-radius: 24px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; z-index: 500;
        }

        .nav-logo {
            font-weight: 800; font-size: 1.3rem; text-decoration: none;
            background: linear-gradient(to right, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        .share-btn {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: white; padding: 10px 24px; border-radius: 14px; cursor: pointer;
            font-weight: 600; border: none; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: 0.3s ease;
        }

        /* --- NEW DARK GAME CONTAINER --- */
        #game-container {
            background: var(--glass); width: 95%; max-width: 500px; padding: 2.5rem;
            border-radius: 30px; box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            margin-top: 20px; /* Spacing below the fixed nav bar */
        }

        /* --- PROGRESS BAR --- */
        .progress-container { margin-bottom: 20px; text-align: left; }
        .progress-text { font-size: 0.8rem; color: var(--primary); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .progress-bar-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: linear-gradient(to right, var(--primary), var(--accent)); width: 0%; height: 100%; transition: 0.4s ease; }

        h3 { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.4; color: white; }

        /* --- CREATIVE BUTTONS --- */
        .btn { background: linear-gradient(135deg, var(--accent), var(--secondary)); color: white; border: none; padding: 16px; border-radius: 16px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; transition: 0.3s ease; }
        .option-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 18px; border-radius: 15px; cursor: pointer; width: 100%; margin-top: 12px; text-align: left; color: #cbd5e1; font-family: inherit; transition: 0.3s; }
        .option-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--primary); color: white; transform: translateX(8px); }

        #share-modal {
            position: fixed; top: 90px; right: 5%; width: 320px; padding: 20px; border-radius: 16px;
            background: var(--gh-dark); border: 1px solid var(--gh-border); display: none; z-index: 1000; color: white;
        }

        #feedback-overlay { position: absolute; inset: 0; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 30px; }
        .hidden { display: none !important; }
        .rank-item { display: flex; justify-content: space-between; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-weight: 600; }
        #loading-msg { font-size: 0.8rem; color: var(--secondary); margin-top: 10px; font-weight: 700; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="intro-title">Simra's Quiz</h1>
        <p class="tagline">Where Curiosity Meets Wisdom</p>
    </div>

    <nav>
        <a href="#" class="nav-logo" onclick="location.reload()">Simra's Quiz</a>
        <button class="share-btn" id="shareBtn">Share Arena</button>
    </nav>

    <div id="share-modal">
        <p style="color: #c9d1d9; font-size: 0.9rem; font-weight: 600;">Arena Link</p>
        <div style="display: flex; background: #0d1117; border: 1px solid var(--gh-border); border-radius: 8px; padding: 10px; margin-top: 10px; align-items: center; gap: 10px;">
            <input type="text" id="repo-link" value="https://s12238244-jpg.github.io/simra/" readonly style="background:transparent; border:none; color:#8b949e; width:100%; outline:none; font-size:0.8rem;">
            <span style="cursor:pointer;" onclick="copyLink()">📋</span>
        </div>
    </div>

    <div id="game-container" class="hidden">
        
        <div id="start-screen">
            <h1 style="color: white; margin-bottom: 10px;">LifeGuard</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">The Ultimate Strategy Challenge.</p>
            <input type="text" id="username" placeholder="Enter Your Hero Name..." style="width: 100%; padding: 16px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--gh-border); color: white; outline: none; margin-bottom: 20px;">
            <button class="btn" onclick="startGame()">ENTER ARENA</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="progress-container">
                <span class="progress-text" id="q-counter">Question 1 of 10</span>
                <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            </div>
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
            
            <div id="feedback-overlay" class="hidden">
                <h1 id="feedback-icon" style="font-size: 5rem; margin-bottom: 10px;"></h1>
                <h2 id="feedback-title" style="margin-bottom: 20px;"></h2>
                <button class="btn" style="width: auto; padding: 12px 40px;" onclick="closeFeedback()">CONTINUE</button>
            </div>
        </div>

        <div id="end-screen" class="hidden">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Mission Complete</h2>
            <p id="loading-msg" class="hidden">Syncing cloud scores...</p>
            <div id="final-leaderboard" style="text-align: left;"></div>
            <button class="btn" onclick="location.reload()">RE-CHALLENGE</button>
        </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT URL HERE
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbydWxniS6CoGqvMx20oiKOMCOW5pWzVmtbWwa71zX2nvkiXbEvfq8N0Ip1A3WaTs_IG/exec"; 

        const questions = [
            { q: "What is a 'Normal' Blood Pressure reading?", a: ["120/80 mmHg", "140/90 mmHg", "160/100 mmHg", "90/60 mmHg"], correct: 0 },
            { q: "Which habit is most damaging for CHD?", a: ["Walking", "Smoking", "Water", "Yoga"], correct: 1 },
            { q: "Obesity management focuses on...", a: ["Sleeping", "Physical activity", "Salt", "Skipping breakfast"], correct: 1 },
            { q: "HIV is NOT transmitted through...", a: ["Contact", "Needles", "Handshakes", "Transfusion"], correct: 2 },
            { q: "Limit what for Hypertension?", a: ["Salt", "Potassium", "Magnesium", "Calcium"], correct: 0 },
            { q: "BMI over 30 is?", a: ["Underweight", "Healthy", "Overweight", "Obese"], correct: 3 },
            { q: "PrEP prevents which condition?", a: ["Obesity", "HIV", "Cold", "High BP"], correct: 1 },
            { q: "CHD affects which part?", a: ["Arteries", "Lungs", "Brain", "Liver"], correct: 0 },
            { q: "Hypertension is the '____ Killer'.", a: ["Fast", "Silent", "Hidden", "Loud"], correct: 1 },
            { q: "Prevent lifestyle diseases via?", a: ["Genetics", "Healthy Choices", "Ignoring", "Sugar"], correct: 1 }
        ];

        let currentQ = 0; let score = 0; let playerName = "";

        // Animations on load
        window.onload = () => setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
            document.getElementById('game-container').classList.remove('hidden');
        }, 3000);

        // Share functionality
        const modal = document.getElementById('share-modal');
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.onclick = (e) => { e.stopPropagation(); modal.style.display = modal.style.display === 'block' ? 'none' : 'block'; };
        window.onclick = (e) => { if (modal.style.display === 'block' && !modal.contains(e.target) && e.target !== shareBtn) modal.style.display = 'none'; };

        function copyLink() {
            const link = document.getElementById('repo-link');
            link.select(); document.execCommand('copy');
            alert('Arena link copied!'); modal.style.display = 'none';
        }

        function startGame() {
            playerName = document.getElementById('username').value.trim();
            if(!playerName) return alert("Enter your name!");
            if(playerName.toLowerCase() === "admin123") { showLeaderboard(); return; }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            // Update Progress
            document.getElementById('q-counter').innerText = `Question ${currentQ + 1} of ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${((currentQ + 1) / questions.length) * 100}%`;
            
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => handleAnswer(idx);
                container.appendChild(b);
            });
        }

        function handleAnswer(idx) {
            const isCorrect = idx === questions[currentQ].correct;
            if (isCorrect) score += 10;
            const overlay = document.getElementById('feedback-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('feedback-icon').innerText = isCorrect ? "✅" : "❌";
            document.getElementById('feedback-title').innerText = isCorrect ? "Correct!" : "Incorrect!";
            document.getElementById('feedback-title').style.color = isCorrect ? "var(--correct)" : "var(--wrong)";
        }

        async function closeFeedback() {
            document.getElementById('feedback-overlay').classList.add('hidden');
            currentQ++;
            if(currentQ < questions.length) {
                showQuestion();
            } else {
                await saveScore();
                showLeaderboard();
            }
        }

        async function saveScore() {
            if (playerName.toLowerCase() === "admin123") return;
            try {
                await fetch(DATABASE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: playerName, score: score }) });
            } catch (e) { console.error("Sync Error", e); }
        }

        async function showLeaderboard() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('loading-msg').classList.remove('hidden');

            try {
                // Fetch live from GS with cache-busting
                const response = await fetch(DATABASE_URL + "?t=" + new Date().getTime());
                const data = await response.json();
                data.sort((a, b) => b.score - a.score);
                document.getElementById('final-leaderboard').innerHTML = data.slice(0, 5).map((e, i) => `
                    <div class="rank-item"><span>#${i+1} ${e.name}</span><span>${e.score} pts</span></div>
                `).join('');
            } catch (e) {
                document.getElementById('final-leaderboard').innerHTML = "Database is connecting...";
            }
            document.getElementById('loading-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
